<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdventureEXP &mdash; Work Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#FFAD49;--or-lt:#FFF3E0;--or-dk:#D4831A;
  --re:#EA5A4F;--re-lt:#FDECEA;
  --bl:#87D3ED;--bl-lt:#E8F7FC;--bl-dk:#2A94BC;
  --kh:#F6E1B6;--kh-lt:#FDF5E4;--kh-dk:#C9A85C;
  --lb:#C0E2EE;--lb-lt:#EAF6FB;--lb-dk:#5AACCF;
  --bg:#F7F4EF;--sur:#FFFFFF;--brd:#EDE8DC;--brd2:#D9D2C0;
  --tx:#1E1C18;--mu:#7A7464;
  --op:#2A9D6E;--op-lt:#E3F7EF;
  --fi:#EA5A4F;--fi-lt:#FDECEA;
  --sh:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);
  --sh2:0 8px 32px rgba(0,0,0,.10);
}
html{background:var(--bg)}
body{font-family:"Nunito Sans",sans-serif;font-size:13px;color:var(--tx);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:0 16px 60px}

/* TOPBAR */

.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0 12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand-name{font-family:"Nunito",sans-serif;font-size:20px;font-weight:900;color:var(--tx)}
.brand-name em{font-style:normal;color:var(--or-dk)}
.brand-url{font-size:10px;color:var(--mu);letter-spacing:.04em;font-weight:500}
.role-sw{display:flex;gap:2px;background:var(--kh-lt);border-radius:8px;padding:3px;border:1px solid var(--kh)}
.rsw{padding:5px 14px;font-size:12px;font-family:"Nunito",sans-serif;font-weight:700;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--mu);transition:all .15s}
.rsw.on{background:#1a3a5c;color:#fff;box-shadow:0 2px 8px rgba(26,58,92,.3)}
.u-menu{display:flex;align-items:center;gap:10px;position:relative}
.bell-wrap{position:relative}
.bell-btn{background:none;border:1px solid var(--brd);border-radius:50%;width:36px;height:36px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;position:relative;transition:all .15s;padding:0;color:var(--mu)}
.bell-btn:hover{background:var(--kh-lt);border-color:var(--or);color:var(--or-dk)}
.bell-btn.has-unread{color:var(--or-dk);border-color:var(--or)}
.bell-btn svg{display:block}
.bell-badge{position:absolute;top:-3px;right:-3px;background:var(--re);color:#fff;border-radius:10px;font-size:9px;padding:1px 5px;font-weight:800;font-family:"Nunito",sans-serif;line-height:1.4;min-width:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.bell-drop{position:absolute;top:calc(100% + 6px);right:0;width:340px;max-height:440px;overflow-y:auto;background:var(--sur);border:1px solid var(--brd);border-radius:12px;box-shadow:var(--sh2);z-index:1000}
.bell-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--sur);z-index:1}
.bell-head h4{font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;margin:0}
.bell-mark-all{background:none;border:none;font-size:11px;color:var(--or-dk);cursor:pointer;font-weight:700}
.bell-mark-all:hover{text-decoration:underline}
.bell-item{padding:10px 14px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:3px}
.bell-item:last-child{border-bottom:none}
.bell-item:hover{background:var(--kh-lt)}
.bell-item.unread{background:var(--or-lt)}
.bell-item.unread:hover{background:var(--or-lt);filter:brightness(.97)}
.bell-text{font-size:12px;line-height:1.5;color:var(--tx)}
.bell-time{font-size:10px;color:var(--mu);font-weight:600}
.bell-empty{padding:24px;text-align:center;font-size:12px;color:var(--mu)}

/* Spinners & loading overlays */
@keyframes aex-spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid var(--brd);border-top-color:var(--or);border-radius:50%;animation:aex-spin .8s linear infinite;vertical-align:middle}
.spinner-lg{width:24px;height:24px;border-width:3px}
.spinner-white{border-color:rgba(255,255,255,.35);border-top-color:#fff}
.asubmit .spinner{margin-right:0;vertical-align:-3px}
.avatar-loading{position:absolute;inset:0;background:rgba(30,28,24,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.avatar-loading::after{content:"";display:block;width:24px;height:24px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:aex-spin .8s linear infinite}
.btn[disabled]{opacity:.55;cursor:not-allowed;pointer-events:none}

/* Confirm modal */
.confirm-icon{width:56px;height:56px;border-radius:50%;background:var(--re-lt);color:var(--re);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px}
.u-av{width:34px;height:34px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:"Nunito",sans-serif;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden}
.u-av img{width:100%;height:100%;object-fit:cover}
.u-av-btn{cursor:pointer;transition:transform .12s, box-shadow .12s}
.u-av-btn:hover{transform:scale(1.05);box-shadow:0 0 0 3px var(--or-lt)}
.lg-btn{font-size:11px;font-family:"Nunito",sans-serif;font-weight:700;color:var(--mu);background:none;border:1.5px solid var(--brd);border-radius:7px;padding:4px 10px;cursor:pointer;transition:all .15s}
.lg-btn:hover{background:var(--re-lt);color:var(--re);border-color:var(--re)}

/* SUBNAV */
.subnav{display:flex;gap:0;margin-bottom:20px;flex-wrap:wrap;border-bottom:2px solid var(--brd);padding-bottom:0}
.snav{padding:8px 16px;font-size:12px;font-family:"Nunito",sans-serif;font-weight:700;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;background:none;color:var(--mu);transition:all .15s;border-radius:0;display:inline-flex;align-items:center;gap:5px}

.snav:hover{color:var(--tx);border-bottom-color:var(--brd2)}
.snav.on{color:var(--or-dk);border-bottom-color:var(--or)}
.nd{width:7px;height:7px;background:var(--re);border-radius:50%;display:inline-block;margin-left:4px;vertical-align:2px}

/* LAYOUT */
.two-col{display:grid;grid-template-columns:210px 1fr;gap:16px;align-items:start}
.pl{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.c2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dw{display:grid;grid-template-columns:1fr 230px;gap:14px;align-items:start}

/* HERO */

.hero::before{content:"";position:absolute;inset:0;opacity:.05;background:repeating-linear-gradient(45deg,transparent,transparent 10px,#fff 10px,#fff 11px)}

.hero-text{position:relative;z-index:1}
.hero-text h2{font-family:"Nunito",sans-serif;font-size:21px;font-weight:900;color:#fff;margin-bottom:5px;line-height:1.2}
.hero-text h2 span{color:var(--or)}
.hero-text p{font-size:12px;color:rgba(255,255,255,.75);line-height:1.6}
.hero-stats{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.hstat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;text-align:center}
.hstat-n{font-family:"Nunito",sans-serif;font-size:18px;font-weight:900;color:var(--or)}
.hstat-l{font-size:9px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-top:1px}

/* CARDS */
.card{background:var(--sur);border:1px solid var(--brd);border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:var(--sh)}
.card-title{font-size:13px;font-family:"Nunito",sans-serif;font-weight:700;margin-bottom:8px}

/* STAT ROW */

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.sc{background:var(--sur);border:1px solid var(--brd);border-top:3px solid var(--or);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.sc:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.sc-n{font-size:28px;font-family:"Nunito",sans-serif;font-weight:900;color:var(--or-dk)}
.sc-l{font-size:10px;font-weight:700;color:var(--mu);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

/* SIDEBAR */
.sidebar{background:var(--sur);border-radius:14px;border:1px solid var(--brd);padding:14px;box-shadow:var(--sh)}
.sbs{margin-bottom:14px}
.sbt{font-size:10px;font-family:"Nunito",sans-serif;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.clr{font-size:10px;color:var(--or-dk);cursor:pointer;background:none;border:none;text-decoration:underline}
.fo{display:flex;justify-content:space-between;align-items:center;padding:4px 7px;font-size:12px;cursor:pointer;border-radius:6px;transition:all .12s}
.fo:hover{background:var(--kh-lt)}
.fo.on{background:var(--or-lt);color:var(--or-dk);font-weight:700}
.fc{font-size:10px;color:var(--mu);background:var(--brd);border-radius:10px;padding:1px 6px}

/* LISTING ROWS */

.lr{display:flex;gap:14px;align-items:flex-start;background:var(--sur);border:1px solid var(--brd);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);transition:all .15s}
.lr[data-action]{cursor:pointer}
.lr[data-action] .fb,.lr[data-action] button{cursor:pointer}
.lr:hover{border-color:var(--or);box-shadow:0 6px 24px rgba(255,173,73,.15);transform:translateY(-1px)}
.lr.hot{border-left:4px solid var(--re)}
.el{width:56px;height:56px;border-radius:12px;border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:var(--kh-lt);overflow:hidden}

.el img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.lb2{flex:1;min-width:0}
.lt{font-size:14px;font-family:"Nunito",sans-serif;font-weight:800;margin-bottom:2px}
.le{font-size:12px;color:var(--bl-dk);margin-bottom:4px;font-weight:600}
.lm{font-size:11px;color:var(--mu);display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;font-weight:500}
.perk{font-size:10px;color:var(--mu);font-weight:600}
.perk::before{content:"// "}
.sp{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:default}
.sp-o{background:var(--op-lt);color:var(--op)}
.sp-f{background:var(--fi-lt);color:var(--fi)}
.fb{background:none;border:none;cursor:pointer;font-size:20px;flex-shrink:0;color:var(--brd2);transition:all .15s;padding:2px;line-height:1}
.fb:hover,.fb.on{color:var(--re)}

/* JOB DETAIL */
.dl{width:64px;height:64px;border-radius:12px;border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;background:var(--kh-lt);overflow:hidden}
.dl img{width:100%;height:100%;object-fit:cover;border-radius:11px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.df{background:var(--bg);border-radius:9px;padding:9px 11px;border:1px solid var(--brd)}
.df label{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px}
.df span{font-size:13px;font-weight:600}
.rb{width:100%;padding:13px;font-size:14px;font-family:"Nunito",sans-serif;font-weight:800;background:var(--or);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:8px;box-shadow:0 4px 14px rgba(255,173,73,.4)}
.rb:hover{background:var(--or-dk);transform:translateY(-1px)}
.rb:disabled{background:var(--brd);color:var(--mu);cursor:default;transform:none;box-shadow:none}
.sc2{background:var(--sur);border:1px solid var(--brd);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:10px}
.mj{padding:7px 0;border-bottom:1px solid var(--brd);font-size:12px;cursor:pointer;color:var(--bl-dk);font-weight:700}
.mj:last-child{border-bottom:none}
.mj:hover{color:var(--or-dk)}

/* PHOTO GRID */

.photo-slot{aspect-ratio:4/3;border-radius:10px;border:2px dashed var(--brd2);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;transition:all .15s;background:var(--bg)}
.photo-slot:hover{border-color:var(--or);background:var(--kh-lt)}
.photo-slot img{width:100%;height:100%;object-fit:cover;border-radius:9px;position:absolute;inset:0}
.photo-slot-lbl{font-size:10px;font-weight:700;color:var(--mu);text-align:center;padding:6px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;z-index:1}
.photo-slot-lbl span{font-size:20px}
.photo-inp{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* CPI */
.cpih{display:inline-flex;flex-direction:column;align-items:center;background:var(--kh-lt);border:1px solid var(--kh);border-radius:9px;padding:4px 10px;min-width:50px}
.cpin{font-size:18px;font-family:"Nunito",sans-serif;font-weight:900}
.cpil{font-size:8px;font-family:"Nunito",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--mu)}

/* MATCH BAR */
.mb{height:5px;border-radius:3px;background:var(--brd);overflow:hidden;margin-top:3px}
.mf{height:100%;border-radius:3px}

/* BADGES */
.bdg{display:inline-block;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;white-space:nowrap;font-family:"Nunito",sans-serif}
.bt{background:var(--op-lt);color:var(--op)}
.ba{background:var(--or-lt);color:var(--or-dk)}
.bc{background:var(--re-lt);color:var(--re)}
.bb{background:var(--bl-lt);color:var(--bl-dk)}
.bp{background:var(--lb-lt);color:var(--lb-dk)}
.bg{background:var(--kh-lt);color:var(--mu);border:1px solid var(--kh)}
.tr{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}

/* PROGRESS */
.prb{height:6px;background:var(--kh-lt);border-radius:3px;overflow:hidden;margin-top:5px;border:1px solid var(--kh)}
.prf{height:100%;background:var(--or);border-radius:3px}
.pcr{width:48px;height:48px;border-radius:50%;border:3px solid var(--or);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:"Nunito",sans-serif;font-weight:900;color:var(--or-dk);flex-shrink:0;background:var(--or-lt)}
.pathway-badge{display:inline-flex;align-items:center;gap:6px;background:var(--re-lt);border:1.5px solid var(--re);border-radius:9px;padding:5px 11px;font-family:"Nunito",sans-serif;font-weight:800;font-size:11px;color:var(--re);margin-top:4px}

/* FORM ELEMENTS */
.qsh{font-size:10px;font-weight:700;color:var(--or-dk);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 9px;padding-bottom:7px;border-bottom:2px solid var(--or-lt);display:flex;align-items:center;gap:6px}
.qsh:first-child{margin-top:0}
.ql{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:6px;display:block;font-family:"Nunito",sans-serif}
.qs{font-size:11px;color:var(--mu);margin-bottom:6px;display:block;font-style:italic}
.cg{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1.5px solid var(--brd);cursor:pointer;background:var(--sur);color:var(--mu);transition:all .12s;user-select:none;font-family:"Nunito",sans-serif}
.chip:hover{border-color:var(--or-dk);color:var(--or-dk)}
.chip.on{background:var(--or-dk);color:#fff;border-color:var(--or-dk)}
.chip.av.on{background:var(--re-lt);color:var(--re);border-color:var(--re)}
.pgb{height:5px;background:var(--brd);border-radius:3px;overflow:hidden;margin-top:6px}
.pgf{height:100%;background:var(--or);border-radius:3px;transition:width .3s}
.radio-group{display:flex;flex-direction:column;gap:6px}
.radio-opt{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1.5px solid var(--brd);border-radius:9px;cursor:pointer;transition:all .12s;font-size:12px;font-weight:600;color:var(--mu);background:var(--sur)}
.radio-opt:hover{border-color:var(--or-dk);color:var(--tx)}
.radio-opt.on{border-color:var(--or);background:var(--or-lt);color:var(--or-dk)}

.radio-opt.on .rdot{border-color:var(--or);background:var(--or)}

.radio-opt.on .rdot-inner{display:block}
input[type=date],select,textarea,input[type=text],input[type=email],input[type=number],input[type=password]{width:100%;font-family:"Nunito Sans",sans-serif;font-size:12px;padding:8px 10px;border:1.5px solid var(--brd);border-radius:9px;background:var(--sur);color:var(--tx);transition:border-color .15s,box-shadow .15s;box-sizing:border-box}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(255,173,73,.12)}
textarea{resize:vertical;min-height:70px}

/* BUTTONS */
.btn{padding:6px 14px;font-size:12px;font-family:"Nunito",sans-serif;font-weight:700;border:1.5px solid var(--brd);border-radius:8px;cursor:pointer;background:none;color:var(--tx);transition:all .15s}
.btn:hover{background:var(--kh-lt)}
.btn-p{background:var(--or);color:#fff;border-color:var(--or)}
.btn-p:hover{background:var(--or-dk)}
.btn-a{background:var(--op-lt);border-color:var(--op);color:var(--op)}
.btn-d{background:var(--re-lt);border-color:var(--re);color:var(--re)}
.btn-b{background:var(--bl-lt);border-color:var(--bl-dk);color:var(--bl-dk)}
.btn-xs{padding:4px 10px;font-size:11px}
.bkb{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-family:"Nunito",sans-serif;font-weight:700;color:var(--mu);cursor:pointer;background:none;border:none;padding:0;margin-bottom:12px}
.bkb:hover{color:var(--or-dk)}

/* MISC */
.shd{font-size:10px;font-family:"Nunito",sans-serif;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 9px}
.sb{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.dv{border:none;border-top:1px solid var(--brd);margin:12px 0}
.fl{display:block;font-size:10px;font-family:"Nunito",sans-serif;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;margin-top:10px}
.empty{text-align:center;padding:3rem;color:var(--mu)}
.hb{background:var(--kh-lt);border-radius:9px;padding:9px 11px;font-size:12px;border:1px solid var(--kh)}
.hb strong{font-size:10px;font-family:"Nunito",sans-serif;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:3px}
.ai{background:var(--lb-lt);border:1.5px dashed var(--lb-dk);border-radius:9px;padding:9px 11px;font-size:11px;color:var(--lb-dk);display:flex;align-items:center;gap:7px;margin-top:10px;font-weight:700}
.ab{background:linear-gradient(135deg,#1E3A5F,#0D6B8E);border-radius:14px;padding:18px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.ab-icon{font-size:38px;flex-shrink:0}
.ab-text h3{font-family:"Nunito",sans-serif;font-size:15px;font-weight:900;color:#fff;margin-bottom:3px}
.ab-text p{font-size:11px;color:rgba(255,255,255,.75);line-height:1.5}

/* MESSAGING */
.mt{max-height:420px;overflow-y:auto;overflow-x:hidden;padding:4px 2px;scroll-behavior:smooth;display:flex;flex-direction:column}
.mb2{padding:8px 12px;border-radius:10px;font-size:12px;margin-bottom:7px;max-width:82%;line-height:1.5;overflow-wrap:anywhere;word-break:break-word;white-space:pre-wrap}
.mo{background:var(--or-lt);color:var(--or-dk);margin-left:auto;border-radius:10px 10px 2px 10px;font-weight:500}
.mi{background:var(--kh-lt);border:1px solid var(--kh);border-radius:10px 10px 10px 2px}

/* MODAL */
.mow{position:fixed;inset:0;background:rgba(30,28,24,.55);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.mod{background:var(--sur);border:1px solid var(--brd);border-radius:14px;padding:22px 24px;box-shadow:var(--sh2);width:100%;max-width:540px}
.mod h3{font-size:15px;font-family:"Nunito",sans-serif;font-weight:800;margin-bottom:14px}
.mf2{display:flex;justify-content:flex-end;gap:7px;margin-top:14px;padding-top:10px;border-top:1px solid var(--brd)}
.success-icon{width:60px;height:60px;background:var(--op-lt);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px}

/* REVIEWS */
.rev-item{padding:10px 0;border-bottom:1px solid var(--brd)}
.rev-item:last-child{border-bottom:none}
.rev-stars{color:var(--or-dk);font-size:14px}
.rev-text{font-size:12px;color:var(--mu);line-height:1.6;margin-top:3px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:32px 16px}
.auth-card{width:100%;max-width:480px;background:var(--sur);border:1px solid var(--brd);border-radius:18px;padding:36px 36px 32px;box-shadow:0 10px 40px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.04)}

.auth-logo-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:22px}
.auth-h1{font-family:"Nunito",sans-serif;font-size:26px;font-weight:900;text-align:center;margin-bottom:6px;color:var(--tx);letter-spacing:-.01em}
.auth-sub{font-size:13px;color:var(--mu);text-align:center;margin-bottom:22px;line-height:1.55}
.auth-sub2{font-size:13px;color:var(--mu);text-align:center;margin-bottom:6px;line-height:1.55}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin:18px 0 22px;border:1px solid var(--brd)}
.auth-tab{flex:1;padding:9px;font-size:13px;font-family:"Nunito",sans-serif;font-weight:700;border:none;background:none;border-radius:7px;cursor:pointer;color:var(--mu);transition:all .15s}
.auth-tab:hover{color:var(--tx)}
.auth-tab.on{background:var(--sur);color:var(--or-dk);box-shadow:var(--sh)}
.albl{display:block;font-size:11px;font-family:"Nunito",sans-serif;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;margin-top:14px}
.ainp{width:100%;font-family:"Nunito Sans",sans-serif;font-size:14px;padding:12px 14px;border:1.5px solid var(--brd);border-radius:10px;background:var(--sur);color:var(--tx);transition:border-color .15s, box-shadow .15s;box-sizing:border-box}
.ainp:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(255,173,73,.15)}
.apw{position:relative}
.apw .ainp{padding-right:64px}
.ashowhide{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;font-family:"Nunito",sans-serif;font-weight:700;color:var(--mu);padding:4px 8px;border-radius:5px}
.ashowhide:hover{color:var(--or-dk);background:var(--or-lt)}
.aerr{font-size:12px;color:var(--re);font-weight:700;min-height:16px;margin-top:6px}
.asubmit{width:100%;padding:14px;font-size:14px;font-family:"Nunito",sans-serif;font-weight:900;background:var(--or);color:#fff;border:none;border-radius:11px;cursor:pointer;margin-top:18px;box-shadow:0 4px 14px rgba(255,173,73,.4);transition:all .15s;letter-spacing:.01em}
.asubmit:hover{background:var(--or-dk);transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,173,73,.5)}
.asubmit:disabled{opacity:.65;cursor:not-allowed;transform:none}
.asmall{font-size:12px;color:var(--mu);text-align:center;margin-top:14px}
.asmall a{color:var(--or-dk);font-weight:700;cursor:pointer}
.asmall a:hover{text-decoration:underline}
.adivider{display:flex;align-items:center;gap:12px;margin:20px 0 14px}
.adivider span{font-size:11px;color:var(--mu);white-space:nowrap;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.adivider::before,.adivider::after{content:"";flex:1;border-top:1px solid var(--brd)}
.demo-box{background:var(--kh-lt);border:1px solid var(--kh);border-radius:12px;padding:14px 16px}
.demo-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--brd)}
.demo-row:last-child{border-bottom:none}
.str-bar{height:5px;background:var(--brd);border-radius:3px;overflow:hidden;margin-top:6px;display:none}
.str-bar.active{display:block}
.str-fill{height:100%;border-radius:3px;transition:all .3s}
.nm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.asuccess{background:var(--op-lt);border:1px solid var(--op);color:var(--op);padding:11px 14px;border-radius:10px;font-size:12px;margin:12px 0 0;line-height:1.55;font-weight:600}
.photo-zone{border:2px dashed var(--brd2);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .15s;position:relative;background:var(--bg);margin-top:4px}
.photo-zone:hover{border-color:var(--or);background:var(--or-lt)}
.photo-zone.has-img{border-color:var(--op);border-style:solid}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2}
.photo-prev{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--op);margin:0 auto 6px;display:block}

/* MOBILE */
@media(max-width:680px){
  .two-col,.dw,.pl,.c2{grid-template-columns:1fr}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .topbar{padding:8px 0}
  .snav{padding:5px 10px;font-size:11px}
  .hero{padding:16px;gap:12px}
  .hero-icon{font-size:36px}
  .hero-text h2{font-size:16px}
  .lr{padding:10px 12px;gap:10px}
  .el{width:44px;height:44px;font-size:20px}
  .photo-grid{grid-template-columns:repeat(2,1fr)}
  .auth-card{padding:28px 22px;border-radius:14px}
  .auth-h1{font-size:22px}
  .mod{padding:16px}
}

</style>
</head>

async function handlePhotoUpload(inp) {
  var key = inp.dataset.photo || '';
  var file = inp.files[0]; if (!file) return;

  // Optimistic preview + visual loading state in the avatar slot of any open modal.
  try {
    var preview = await new Promise(function(resolve){
      var r = new FileReader();
      r.onload = function(ev){ resolve(ev.target.result); };
      r.readAsDataURL(file);
    });
    photoStore[key] = preview;
  } catch(_) {}
  // Inject a spinner overlay on the modal's avatar slot if one is open.
  var modalAv = document.querySelector('.mod [data-photo-slot="'+key+'"]');
  if (modalAv && !modalAv.querySelector('.avatar-loading')) {
    modalAv.insertAdjacentHTML('beforeend', '<div class="avatar-loading"></div>');
  }
  // Disable any Save / Change-photo button until upload completes.
  document.querySelectorAll('.mod button').forEach(function(b){ b.setAttribute('disabled', 'true'); });

  try {
    if (key === 'profile' || key === 'avatar') {
      // Participant / admin avatar.
      if (!currentUser) throw new Error('not signed in');
      var url = await window.Upload.uploadProfilePhoto(file, currentUser.id);
      await window.sb.from('profiles').update({ photo_url: url }).eq('id', currentUser.id);
      currentUser.photo_url = url;
      photoStore['profile'] = url; // refresh the cached preview to the final URL
    } else if (key.indexOf('emp-') === 0) {
      // Employer photo slot: key shape "emp-<employerId>-<slotIndex>".
      var parts = key.split('-');
      // Reconstruct UUID (it contains dashes itself).
      var slotIdx = parseInt(parts[parts.length - 1], 10);
      var empId = parts.slice(1, parts.length - 1).join('-');
      var empUrl = await window.Upload.uploadEmployerPhoto(file, empId);
      var emp = E(empId);
      var photos = (emp && emp.photos) ? emp.photos.slice() : [];
      photos[slotIdx] = empUrl;
      await window.sb.from('employers').update({ photos: photos.filter(Boolean) }).eq('id', empId);
    } else if (key.indexOf('housing-') === 0) {
      // Housing photo slot: key shape "housing-<jobId>-<slotIndex>".
      var hParts = key.split('-');
      var hIdx = parseInt(hParts[hParts.length - 1], 10);
      var jobId = hParts.slice(1, hParts.length - 1).join('-');
      var housingUrl = await window.Upload.uploadHousingPhoto(file, jobId);
      // Stash the URL under the photoStore key so the UI shows it; persisting
      // to a jobs.photos column would need a schema column we haven't added.
      photoStore[key] = housingUrl;
    } else {
      // Unknown key — just keep the local preview.
      return;
    }
  } catch (e) {
    console.error('photo upload failed', key, e);
    alert('Upload failed: ' + (e.message || 'unknown error'));
    delete photoStore[key];
  }
  await hydrateAndRender();
  // Re-open the profile modal if it was open, so the avatar swaps to the
  // final hosted URL and the Save button re-enables.
  if (key === 'profile' || key === 'avatar') {
    var stillOpen = document.querySelector('.mod h3');
    if (stillOpen && stillOpen.textContent.indexOf('Edit profile') >= 0) {
      openEditProfile();
    }
  }
}

// ============================================================================
// Realtime — push new messages and applications to the UI without refresh.
// ============================================================================
var _rtChannel = null;
function subscribeRealtime() {
  if (_rtChannel || !window.sb || !currentUser) return;
  _rtChannel = window.sb.channel('aex-realtime')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'messages' },
      function(payload) {
        // Use the payload row directly — no refetch. Two reasons:
        //  (1) the row is already in the payload, so refetching is wasted work;
        //  (2) `await DB.listThread()` here races with concurrent realtime
        //      events and PostgREST's read snapshot — the SELECT can return
        //      BEFORE the just-INSERTed row is visible to this connection,
        //      which is why the badge updated but the modal kept rendering
        //      the old thread.
        var m = payload.new;
        if (!m || !m.application_id) return;
        console.log('[rt] new message', m.id, 'in app', m.application_id);
        [apps, allApps].forEach(function(arr){
          var a = arr.find(function(x){return x.id === m.application_id;});
          if (!a) return;
          a.messages = a.messages || [];
          // Dedupe — sendMsg may have already appended this same row from
          // the INSERT…RETURNING response before realtime delivered it.
          if (!a.messages.some(function(x){return x.id === m.id;})) {
            a.messages.push(m);
          }
          a.messageCount = a.messages.length;
        });
        if (_openThreadAppId && _openThreadAppId === m.application_id) {
          // Live, in-place DOM append: the new bubble shows up instantly,
          // textarea draft + focus + scroll position are preserved, and
          // there's no chance of openTC's full-rebuild missing the update.
          if (!appendMessageToOpenThread(m)) {
            // Modal's DOM is gone (race during close) — fall back to a full
            // re-render so the state is still consistent.
            var a = apps.find(function(x){return x.id===m.application_id;}) ||
                    allApps.find(function(x){return x.id===m.application_id;});
            if (a) openTC(a);
          }
        } else {
          render();
        }
      }
    )
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'applications' },
      async function() {
        // A new application landed (admin or participant) — refresh the cache.
        try {
          await window.DB.hydrateAll({ currentUser, employers, jobs, students, apps, allApps, notifications, reviews });
          render();
        } catch(_) {}
      }
    )
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'applications' },
      async function() {
        try {
          await window.DB.hydrateAll({ currentUser, employers, jobs, students, apps, allApps, notifications, reviews });
          render();
        } catch(_) {}
      }
    )
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'notifications', filter: 'recipient_id=eq.'+currentUser.id },
      function(payload) {
        if (!payload.new) return;
        notifications.unshift(payload.new);
        updateTopbarUser();
      }
    )
    .subscribe(function(status, err){
      console.log('[rt] channel status:', status, err || '');
    });
}

  if (/[A-Z]/.test(pw)) s++;

  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return s;
}

async function resetAuthState() {
  // Nuke every place a stuck Supabase auth token could be hiding, then reload.
  // Use this when "Sign in" hangs and the connectivity probe shows a stale
  // token / extension interference / orphaned navigator.locks lease.
  try {
    if (window.sb && window.sb.auth) {
      try { await window.sb.auth.signOut({ scope: 'local' }); } catch (_) {}
    }
    // Belt-and-braces: remove any leftover sb-* keys regardless of project ref.
    var keysToRemove = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('sb-') === 0) keysToRemove.push(k);
    }
    keysToRemove.forEach(function(k){ localStorage.removeItem(k); });
    // Also clear any leftover service worker — they survive page reloads.
    if ('serviceWorker' in navigator) {
      try {
        var regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function(r){ return r.unregister(); }));
      } catch (_) {}
    }
  } catch (e) {
    console.error('[resetAuthState] failed', e);
  }
  location.reload();
}

// Lock that stops onAuthChange from auto-routing to the dashboard while an
// auth handler (doLogin / doCreateParticipant / doSetPassword) is mid-flight.
// Those handlers run their own role checks and decide where the user lands;
// without this lock, Supabase's SIGNED_IN event races ahead and hydrates the
// dashboard before the role check has a chance to reject the wrong tab.
window._aexAuthInFlight = false;

// Swap the submit button for `actionName` with a spinner while `fn` runs.
async function withSubmitLoading(actionName, fn) {
  var btn = document.querySelector('[data-action="'+actionName+'"]');
  var original = btn ? btn.innerHTML : null;
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner spinner-white"></span>';
  }
  try {
    await fn();
  } finally {
    if (btn && original !== null) {
      btn.disabled = false;
      btn.innerHTML = original;
    }
  }
}

    }
    // Release the recovery lock so SIGNED_IN events route normally again,
    // and strip the recovery token from the URL hash so a refresh doesn't
    // re-trigger the flow.
    window._aexInRecovery = false;
    try {
      history.replaceState(null, '', window.location.pathname);

    authMode = "login";

      var session = await window.Auth.getCurrentSession();

async function doLogin() {
  var email = (document.getElementById("li-email")||{}).value||""; email = email.trim();
  var pw = (document.getElementById("li-pw")||{}).value||"";
  var err = document.getElementById("li-err");
  var btn = document.querySelector('button.asubmit[data-action="dologin"]');
  if(!email||!pw){if(err)err.textContent="Please enter your email and password.";return;}

  // Reset the error, disable the button, give visible "in flight" feedback so
  // a hung or silently-failing call is never mistaken for "the page is stuck".
  if (err) err.textContent = "";
  var origLabel = btn ? btn.innerHTML : "";
  if (btn) { btn.disabled = true; btn.innerHTML = "Signing in&hellip;"; }

  // Lock the auth-state listener so the implicit SIGNED_IN event doesn't
  // race ahead and hydrate the dashboard before we have a chance to verify
  // that the user picked the right tab (Participant vs Admin).
  window._aexAuthInFlight = true;

  try {
    if (!window.Auth || !window.DB) {
      throw new Error("Auth module not loaded yet. Refresh the page and try again.");
    }
    console.log('[doLogin] start', { email, mode: authMode });
    if (authMode === "admin-login") {
      var res = await window.Auth.adminLogin(email, pw);
      if (!res.ok) { if(err) err.textContent = res.reason; return; }
      currentUser = legacyUser(res.user);
      role = "admin";
    } else {
      await window.Auth.login(email, pw);
      var profile = await window.Auth.getCurrentUser();
      if (profile && profile.role === "admin") {
        await window.Auth.logout();
        currentUser = null;
        // render() rebuilds the auth form — the OLD #li-err is gone, so
        // we must look up the freshly-rendered element to set the message.
        render();
        var freshErr1 = document.getElementById("li-err");
        if (freshErr1) freshErr1.textContent = "Please use the Admin tab to sign in.";
        return;
      }
      currentUser = legacyUser(profile);
      role = "student";
    }
    console.log('[doLogin] success → hydrating');
    await hydrateAndRender();
  } catch (e) {
    console.error('[doLogin] failed', e);
    var msg = (window.Auth && window.Auth.mapAuthError)
      ? window.Auth.mapAuthError(e)
      : (e && e.message) || "Sign-in failed. Try again.";
    if (err) err.textContent = msg;
  } finally {
    window._aexAuthInFlight = false;
    if (btn) { btn.disabled = false; btn.innerHTML = origLabel || "Sign in &#8594;"; }
  }
}

    case 'application_placed':     return '✨ You\'re placed at '+(p.employer_name||'');
    case 'application_withdrawn':  return 'Application withdrawn — '+(p.job_title||'');
    case 'new_message': {
      // For participants viewing: admin → "Your coordinator"
      // For admins viewing: participant → first name (or "A participant")
      var sender = safeName(p.sender_name, amAdmin ? 'A participant' : 'Your coordinator');
      return '💬 <strong>'+sender+'</strong>: '+(p.preview||'');
    }
    case 'employer_verification_request': return 'Verify employer — '+(p.employer_name||'');
    case 'incomplete_profile_reminder':   return safeName(p.participant_name, 'A participant')+' has an incomplete profile';
    default: return n.event_type.replace(/_/g, ' ');
  }
}

function renderBellDropdown() {
  if (!notifications.length) {
    return '<div class="bell-empty">No notifications yet</div>';
  }
  var sorted = notifications.slice().sort(function(a,b){
    return new Date(b.created_at) - new Date(a.created_at);
  });
  return sorted.slice(0, 30).map(function(n){
    var when = new Date(n.created_at).toLocaleString([], {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
    return '<div class="bell-item'+(n.read_at?'':' unread')+'" data-action="opennotif" data-id="'+n.id+'">' +
      '<div class="bell-text">'+notificationLabel(n)+'</div>' +
      '<div class="bell-time">'+when+'</div>' +
    '</div>';
  }).join('');
}

function renderBell() {
  var unread = notifications.filter(function(n){return !n.read_at;}).length;
  // Inline SVG bell — sharp, scales with currentColor, no emoji font fallback.
  var bellSvg =
    '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" ' +
      'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>' +
      '<path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>' +
    '</svg>';
  return '<div class="bell-wrap">' +
    '<button class="bell-btn'+(unread>0?' has-unread':'')+'" data-action="togglebell" title="Notifications" aria-label="Notifications">' +
      bellSvg +
      (unread > 0 ? '<span class="bell-badge">'+(unread > 9 ? '9+' : unread)+'</span>' : '') +
    '</button>' +
    (_bellOpen ? '<div class="bell-drop">' +
      '<div class="bell-head"><h4>Notifications</h4>' +
        (unread > 0 ? '<button class="bell-mark-all" data-action="markallread">Mark all as read</button>' : '') +

async function toggleBell() {
  _bellOpen = !_bellOpen;
  // Refresh from DB on open so we don't show stale state.
  if (_bellOpen && currentUser) {
    try {
      var list = await window.Notify.listMyNotifications(currentUser.id);
      notifications.length = 0;
      notifications.push.apply(notifications, list);
    } catch(e) { console.error('listNotifications failed', e); }
  }
  updateTopbarUser();
}

async function openNotification(id) {
  var n = notifications.find(function(x){return x.id === id;});
  if (!n) return;
  if (!n.read_at) {
    try { await window.Notify.markRead(id); n.read_at = new Date().toISOString(); }
    catch(e) { console.error('markRead failed', e); }
  }
  // Navigate based on event_type.
  var p = n.payload || {};
  if (p.application_id && (n.event_type === 'new_message' || n.event_type.indexOf('application_') === 0)) {
    _bellOpen = false;
    updateTopbarUser();
    if (currentUser.role === 'admin') {
      adminView = 'applications';
      role = 'admin';
    } else {
      studentView = 'applications';
    }
    openThread(p.application_id);
  } else {
    updateTopbarUser();
  }
}

async function markAllNotificationsRead() {
  if (!currentUser) return;
  try {
    await window.Notify.markAllRead(currentUser.id);
    notifications.forEach(function(n){ n.read_at = n.read_at || new Date().toISOString(); });
  } catch(e) { console.error('markAllRead failed', e); }
  updateTopbarUser();
}

  var filled=0;
  if(p.startDate)filled++;
  if(p.roles&&p.roles.length)filled++;
  if(p.envs&&p.envs.length)filled++;
  if(p.hobbies&&p.hobbies.length)filled++;
  if(p.finGoal)filled++;

  if(filled<1) return '<div class="card" style="text-align:center;padding:2rem;color:var(--mu);font-size:12px"><div style="font-size:28px;margin-bottom:10px">&#9968;</div>Answer a few questions to see your profile take shape</div>';

  // Score all jobs
  var scored=jobs.map(function(j){return Object.assign({},j,{score:scoreJob(j,p)});}).sort(function(a,b){return b.score.overall-a.score.overall;});

  // Summarise which JOB TYPES match best (not individual listings)
  var typeMap={};
  scored.forEach(function(j){
    var key=j.type||"General";
    if(!typeMap[key]){typeMap[key]={type:key,scores:[],envs:new Set(),count:0};}
    typeMap[key].scores.push(j.score.overall);
    typeMap[key].envs.add(j.env);
    typeMap[key].count++;
  });
  var typeArr=Object.values(typeMap).map(function(t){
    t.avg=Math.round(t.scores.reduce(function(a,b){return a+b;},0)/t.scores.length);
    t.envList=[...t.envs].join(", ");
    return t;
  }).sort(function(a,b){return b.avg-a.avg;});

  var top=scored[0];
  var topC=mColor(top.score.overall);
  var pw=pathway||calcPathway(p);

  var html='<div style="position:sticky;top:70px">';

  // Pathway + top match summary
  html+='<div class="card" style="margin-bottom:10px">';
  if(pw) html+='<div class="pathway-badge" style="margin-bottom:12px">&#127919; '+pw+'</div>';
  html+='<div style="display:flex;align-items:center;gap:12px;background:var(--kh-lt);border:1px solid var(--kh);border-radius:10px;padding:10px 12px;margin-bottom:12px">';
  html+='<div style="width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;border:3px solid '+topC+';color:'+topC+';font-family:Nunito,sans-serif">'+top.score.overall+'%</div>';
  html+='<div><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Best matching job type</div>';
  html+='<div style="font-size:14px;font-weight:800;font-family:Nunito,sans-serif">'+(top.type||"General")+'</div>';
  html+='<div style="font-size:11px;color:var(--mu)">'+mLabel(top.score.overall)+'</div></div></div>';

  // Category breakdown for top job
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px">';
  CATL.forEach(function(lbl,i){
    html+='<div style="background:var(--bg);border:1px solid var(--brd);border-radius:9px;padding:7px 9px">';
    html+='<div style="font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">'+lbl+'</div>';
    html+='<div style="height:4px;background:var(--brd);border-radius:2px;overflow:hidden;margin-bottom:3px"><div style="height:100%;width:'+top.score.cats[i]+'%;background:'+CATC[i]+';border-radius:2px;transition:width .4s"></div></div>';
    html+='<div style="font-size:11px;font-weight:900;font-family:Nunito,sans-serif;color:'+CATC[i]+'">'+top.score.cats[i]+'%</div>';
    html+='</div>';
  });
  html+='</div>';
  html+='</div>';

  // Job type rankings
  html+='<div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Job types ranked by fit</div>';
  typeArr.forEach(function(t){
    var c2=mColor(t.avg);
    html+='<div class="card" style="margin-bottom:7px;padding:10px 12px">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<div><div style="font-size:13px;font-weight:800;font-family:Nunito,sans-serif">'+t.type+'</div>';
    html+='<div style="font-size:10px;color:var(--mu)">'+t.count+' position'+(t.count!==1?'s':'')+' &nbsp;&#183;&nbsp; '+t.envList+'</div></div>';
    html+='<div style="display:flex;flex-direction:column;align-items:center;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:3px 9px;min-width:48px">';
    html+='<span style="font-size:15px;font-weight:900;font-family:Nunito,sans-serif;color:'+c2+'">'+t.avg+'%</span>';
    html+='<span style="font-size:8px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.04em">avg match</span></div></div>';
    html+='<div style="height:5px;background:var(--brd);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+t.avg+'%;background:'+c2+';border-radius:3px;transition:width .4s"></div></div>';
    html+='</div>';
  });

  html+='</div>';
  return html;
}

// Tracks the currently-open message thread so realtime knows whether to
// refresh the modal vs. just bump the count. Set in openTC, cleared in closeModal.
var _openThreadAppId = null;

// Shared HTML renderer for a single message bubble. Used both by openTC
// (initial render) and appendMessageToOpenThread (live in-place append).
// Each bubble carries data-msg-id so dedupe is a single DOM query.
function _msgBubbleHTML(m, myId) {
  // Support both legacy in-memory shape ({from,text,ts}) and DB shape ({sender_id,body,created_at}).
  var fromMe = m.sender_id ? m.sender_id === myId : (m.from === (role==='employer'?'employer':'student'));
  var text = m.body || m.text || '';
  var when = m.created_at ? new Date(m.created_at).toLocaleString([], {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : (m.ts || '');
  var idAttr = m.id ? ' data-msg-id="'+m.id+'"' : '';
  return '<div class="mb2 '+(fromMe?'mo':'mi')+'"'+idAttr+'>'+text+'<div style="font-size:9px;opacity:.55;margin-top:3px">'+when+'</div></div>';
}

// Append a single message to the open thread modal IN PLACE (without
// re-rendering the whole modal). This is what keeps the textarea content,
// focus, and scroll position intact when a realtime message lands. Returns
// true if the modal was open and the message was added (or already present),
// false otherwise — callers fall back to a full render() for the badge.
function appendMessageToOpenThread(m) {
  if (!m || !m.application_id) return false;
  if (_openThreadAppId !== m.application_id) return false;
  var list = document.getElementById('mt-list');
  if (!list) return false;
  if (m.id && list.querySelector('[data-msg-id="'+m.id+'"]')) return true; // already there

  // Supabase realtime can deliver a `payload.new` with only key columns
  // populated (depending on publication settings) — body comes back empty,
  // which produces the "empty bubble" symptom while the modal stays open. If
  // body is missing, fetch the full row by id and re-call ourselves. The
  // user briefly sees a placeholder bubble that fills in milliseconds later.
  if ((m.body == null || m.body === '') && m.id && window.sb) {
    var placeholderId = 'msg-pending-' + m.id;
    if (!document.getElementById(placeholderId)) {
      var ph = document.createElement('div');
      ph.id = placeholderId;
      ph.className = 'mb2 mi';
      ph.setAttribute('data-msg-id', m.id);
      ph.style.opacity = '0.4';
      ph.textContent = '...';
      list.appendChild(ph);
      list.scrollTop = list.scrollHeight;
    }
    window.sb.from('messages').select('*').eq('id', m.id).maybeSingle().then(function(r){
      var phEl = document.getElementById(placeholderId);
      if (r && r.data) {
        // Update the cached a.messages entry so the next full re-render
        // also has the body (e.g. on close+reopen).
        var full = r.data;
        [apps, allApps].forEach(function(arr){
          var a = arr.find(function(x){return x.id === full.application_id;});
          if (!a || !Array.isArray(a.messages)) return;
          var idx = a.messages.findIndex(function(x){return x.id === full.id;});
          if (idx >= 0) a.messages[idx] = full;
        });
        // Swap the placeholder for the real bubble.
        if (phEl) {
          var myId = currentUser && currentUser.id;
          var temp = document.createElement('div');
          temp.innerHTML = _msgBubbleHTML(full, myId);
          var node = temp.firstChild;
          if (node && phEl.parentNode) phEl.parentNode.replaceChild(node, phEl);
          var listEl = document.getElementById('mt-list');
          if (listEl) listEl.scrollTop = listEl.scrollHeight;
        }
      } else if (phEl && phEl.parentNode) {
        // Refetch failed — drop the placeholder so the thread doesn't keep
        // an "..." ghost row.
        phEl.parentNode.removeChild(phEl);
      }
    });
    return true;
  }

  var myId = currentUser && currentUser.id;
  var temp = document.createElement('div');
  temp.innerHTML = _msgBubbleHTML(m, myId);
  var node = temp.firstChild;
  if (node) list.appendChild(node);
  list.scrollTop = list.scrollHeight;
  return true;
}

function openTC(a){
  if(!a)return;
  _openThreadAppId = a.id;
  var j=J(a.jobId);
  var e=E(j&&j.empId);
  var s=S(a.studentId);
  var myId = currentUser && currentUser.id;
  // Preserve a partially-typed message across re-renders. openTC is called
  // both on initial open AND as a fallback if the live DOM append can't
  // find #mt-list — we don't want either to wipe the user's draft.
  var prevTa = document.getElementById('mf');
  var draft = prevTa ? prevTa.value : '';
  showModal('<h3>'+s.name+' and '+(e&&e.name||"")+'</h3>'+
    '<div style="font-size:11px;color:var(--mu);margin-bottom:10px">'+(j&&j.title||"")+' · '+bdg(a.status,STC[a.status])+'</div>'+
    '<div class="mt" id="mt-list">'+(a.messages||[]).map(function(m){ return _msgBubbleHTML(m, myId); }).join("")+'</div>'+
    '<textarea id="mf" placeholder="Write a message..." style="margin-top:10px"></textarea>'+
    '<div class="mf2"><button class="btn btn-xs" data-action="closemod">Close</button><button class="btn btn-xs btn-p" data-action="sendmsg" data-id="'+a.id+'">Send</button></div>');
  // Scroll to the latest message and restore the draft after the DOM is in place.
  setTimeout(function(){
    var list = document.getElementById('mt-list');

  }, 0);
}

async function sendMsg(id){
  var a = allApps.find(function(x){return x.id===id;}) || apps.find(function(x){return x.id===id;});
  var ta = document.getElementById("mf");
  var txt = ta && ta.value.trim();
  if (!a || !txt || !currentUser) return;
  try {
    // sendMessage already does INSERT…RETURNING, so the returned row has the
    // real id and created_at. Append it locally (deduped by id so the realtime
    // INSERT echoing back will not double-add) and re-render immediately —
    // no listThread refetch, which used to race PostgREST's read snapshot
    // and leave the modal showing the stale thread.
    var newMsg = await window.DB.sendMessage(a.id, currentUser.id, txt);
    a.messages = a.messages || [];
    if (newMsg && !a.messages.some(function(x){return x.id === newMsg.id;})) {
      a.messages.push(newMsg);
    }
    a.messageCount = a.messages.length;
    if (ta) ta.value = '';
    try {
      window.Notify.notify('new_message', {
        application_id: a.id,
        sender_name: currentUser.firstName,
        preview: txt.slice(0, 120),
      });
    } catch(_) {}
    // Live append the just-sent bubble in place so it appears instantly and
    // the textarea stays focused. Realtime will echo this same row back
    // shortly — appendMessageToOpenThread dedupes by data-msg-id.
    if (newMsg && !appendMessageToOpenThread(newMsg)) {
      // Modal isn't open for some reason — fall through to full render.
      openTC(a);
    }
  } catch(e) {
    console.error('sendMsg failed', e);
    alert('Send failed: '+e.message);
    return;
  }
}

// Debounced save to program_profile. Mutates local state immediately so the
// UI is snappy, then upserts to Supabase 400ms after the last edit. The DB
// trigger recomputes profile_score + pathway server-side; we mirror locally
// for the optimistic render.
var _pdPending = null;
var _pdTimer = null;
function queueProgramSave() {
  if (!currentUser) return;
  if (_pdTimer) clearTimeout(_pdTimer);
  _pdTimer = setTimeout(async function(){
    var s = currentStudent();
    if (!s || !s.pd) return;
    var snapshot = Object.assign({}, s.pd);
    try {
      await window.DB.saveProgramProfile(currentUser.id, snapshot);
      // Re-fetch profile so profile_score + pathway from the trigger land in UI.
      var fresh = await window.Auth.fetchProfile(currentUser.id);
      s.profileScore = fresh.profile_score || 0;
      s.pathway = fresh.pathway || '';
      render();
    } catch(e) { console.error('save program profile failed', e); }
  }, 400);
}

      document.querySelectorAll('[data-field="jf_season"]').forEach(function(c){ c.classList.remove('on'); });
    }
    el.classList.toggle('on');
    return;
  }
  // Student profile chips
  var s = currentStudent();
  if(!s||!s.pd) return;
  var arr = s.pd[field]||[];
  if(arr.includes(val)){
    s.pd[field] = arr.filter(function(v){ return v !== val; });
  } else {
    if(field==="roles" && arr.length >= 3) return;
    s.pd[field] = arr.concat([val]);
  }

  s.profileScore = calcProfileScore(s.pd);

}

async function saveEmpFull(eid) {
  var name = (document.getElementById('ef-name')||{}).value||'';
  if(!name.trim()){alert('Please enter the employer name.');return;}

  function v(id){var el=document.getElementById('ef-'+id);return el?el.value.trim():'';}
  function chipVals(field){return [...document.querySelectorAll('[data-field="ef_'+field+'"].chip.on')].map(function(el){return el.dataset.val;});}
  function radioVal(field){var el=document.querySelector('[data-field="ef_'+field+'"].radio-opt.on');return el?el.dataset.val:'';}
  function toInt(s){var n=parseInt(s,10);return isNaN(n)?null:n;}
  function toNum(s){var n=parseFloat(s);return isNaN(n)?null:n;}
  function toBool(s){return s==='yes'||s==='true'||s===true;}
  function enumOr(val, allowed){return allowed.indexOf(val)>=0?val:null;}
  function strOrNull(s){return s?s:null;}

  var city = v('city'), state = v('state');
  var patch = {
    name: name.trim(),
    contact_name: strOrNull(v('contact_name')),
    contact_title: strOrNull(v('contact_title')),
    email: strOrNull(v('contact_email')),
    phone: strOrNull(v('contact_phone')),
    description: strOrNull(v('desc')),
    website: strOrNull(v('website')),
    industry: 'hospitality',
    address: strOrNull(v('address')),
    city: strOrNull(city),
    state: strOrNull(state),
    zip: strOrNull(v('zip')),
    region: city && state ? city + ', ' + state : (city || state || null),
    employee_count: toInt(v('employees')),
    nearest_airport: strOrNull(v('airport')),
    transportation: strOrNull(radioVal('transavail')),
    benefits: strOrNull(v('benefits')),
    pay_frequency: enumOr(radioVal('payperiod'), ['weekly','biweekly','monthly']),
    drug_testing: toBool(radioVal('drugtest')),
    interview_contact: strOrNull(radioVal('intconductor')),
    interview_method: enumOr(radioVal('intformat'), ['phone','video','in-person']),
    housing_desc: strOrNull(v('housing_setup')),
    housing_cost: toNum(v('housing_cost')),
    housing_inclusions: (chipVals('housinginc')||[]).join(', ') || null,
    housing_coed: toBool(radioVal('housingcoed')),
    housing_bedrooms: toInt(v('housing_bedrooms')),
    housing_beds_per_room: toInt(v('housing_beds_per')),
    housing_kitchen: toBool(radioVal('housingkitchen')),
    housing_address: strOrNull(v('housing_address')),
    housing_deposit: toNum(v('housing_deposit')),
    housing_refund_policy: strOrNull(radioVal('housingdeprefund')),
    hiring_start_month: strOrNull(v('start_month')),
    hiring_end_month: strOrNull(v('end_month')),
  };

  try {
    if (eid && eid !== '0' && eid !== 0) {
      var u = await window.sb.from('employers').update(patch).eq('id', eid);
      if (u.error) throw u.error;
    } else {
      var ins = await window.sb.from('employers').insert(patch);
      if (ins.error) throw ins.error;
    }
  } catch (e) {
    console.error('save employer failed', e);
    alert('Save failed: ' + (e.message || 'unknown error'));
    return;
  }

  window._empFormData = null;
  adminEmpFormId = null;
  adminView = 'employers';
  await hydrateAndRender();
}

// ============================================================================
// Supabase boot — wait for the module bridge, then read the persisted session.
// ============================================================================
var notifications = [];
var reviews = [];

function whenSbReady(fn) {
  if (window.__SB_READY__) return fn();
  window.addEventListener('sb-ready', fn, { once: true });
}

// Single source of truth for the boot path: subscribe to onAuthChange and let
// Supabase's INITIAL_SESSION tell us whether there is a restored session.
//
// We deliberately do NOT also call getCurrentSession()/getCurrentUser() in
// parallel. The previous version did, and `getSession()` can hang when the
// supabase-js client is mid-refresh on a navigator.locks lease — leaving the
// page blank with role-sw showing from its CSS default until the next refresh.
function boot() {
  // ── Password-recovery flow detection ────────────────────────────────────
  // When the user clicks the reset link in the email, the URL is shaped like
  //   http://localhost:8000/adventureexp_portal.html#access_token=...&type=recovery
  // Supabase-js fires TWO events for this: INITIAL_SESSION first (the
  // recovery JWT counts as a session) and PASSWORD_RECOVERY shortly after.
  // Without an upfront lock we'd render the dashboard between them, which
  // also "auto-completes" the recovery as soon as the user types anything.
  // Detect the recovery flag in the hash BEFORE Supabase processes it, lock
  // the flow into the set-new-password screen, and ignore SIGNED_IN events
  // until the user actually submits a new password.
  var isRecoveryFlow = /[#&]type=recovery/.test(window.location.hash || '');
  window._aexInRecovery = isRecoveryFlow;
  if (isRecoveryFlow) {
    currentUser = null;
    authMode = 'set-new-password';
    var roleSwR = document.querySelector('.role-sw');
    if (roleSwR) roleSwR.style.display = 'none';
    render();
  }

  var hasPersistedSession = false;
  try {
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('sb-') === 0 && k.indexOf('-auth-token') > -1) {
        hasPersistedSession = true;
        break;
      }
    }
  } catch (_) {}

  var roleSw = document.querySelector('.role-sw');
  if (roleSw) roleSw.style.display = 'none';

  if (isRecoveryFlow) {
    // Already rendered the set-new-password screen above. Don't show Loading…
    // or login.
  } else if (hasPersistedSession) {
    var main = document.getElementById('main');
    if (main) main.innerHTML =
      '<div style="padding:64px 32px;text-align:center;color:var(--mu);font-size:13px;font-family:Nunito,sans-serif">Loading&hellip;</div>';
  } else {
    // No session — render login form right away.
    render();
  }

  var resolved = !hasPersistedSession;
  function resolve() {
    if (resolved) return;
    resolved = true;
    render();
  }

  window.Auth.onAuthChange(async function(profile, event) {
    // User landed via the password-reset email link — show the set-new-password screen.
    if (event === 'PASSWORD_RECOVERY') {
      window._aexInRecovery = true;
      currentUser = null;
      authMode = 'set-new-password';
      render();
      resolve();
      return;
    }
    // Lock: while in recovery flow, ignore the implicit sign-in events that
    // Supabase fires when it processes the recovery JWT. Without this we'd
    // hydrate + render the dashboard between INITIAL_SESSION and
    // PASSWORD_RECOVERY, briefly auto-logging the user in before they pick
    // a new password.
    if (window._aexInRecovery && (
      event === 'SIGNED_IN' ||
      event === 'INITIAL_SESSION' ||
      event === 'TOKEN_REFRESHED' ||
      event === 'USER_UPDATED'
    )) {
      return;
    }
    // Lock: while doLogin/doSignup is mid-flight, ignore the SIGNED_IN event
    // that fires *during* their await chain — they verify the role first and
    // decide whether to keep the session or sign back out.
    if (window._aexAuthInFlight && (event === 'SIGNED_IN' || event === 'INITIAL_SESSION')) {
      return;
    }
    if (event === 'SIGNED_OUT' || !profile) {
      currentUser = null;
      resolve();
      return;
    }
    // First time we see a logged-in user this boot: pick the default role.
    // Subsequent events (TOKEN_REFRESHED, USER_UPDATED) preserve the user's
    // current role selection.
    if (!currentUser) {
      role = profile.role === 'admin' ? 'admin' : 'student';
    }
    currentUser = legacyUser(profile);
    resolved = true;
    try {
      await window.DB.hydrateAll({ currentUser, employers, jobs, students, apps, allApps, notifications, reviews });
    } catch (e) { console.error('[boot] hydrate failed', e); }
    render();
  });

  // Failsafe: if auth still hasn't reported back after 10s (network dead,
  // refresh_token rejected with no event, etc.), fall back to login rather
  // than leaving the user staring at "Loading..." forever.
  setTimeout(function() {
    if (!resolved) console.warn('[boot] auth did not resolve within 10s — falling back to login');
    resolve();
  }, 10000);
}

whenSbReady(boot);
